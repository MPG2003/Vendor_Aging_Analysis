<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Intelligence – SAP Vendor Risk Monitoring</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>

    /* ══════════════════════════════════════════════
       AI Intelligence — chatbot full height
    ══════════════════════════════════════════════ */

    .intel-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      /* fill the remaining viewport height below the page header */
      height: calc(100vh - 130px);
    }

    /* ══════════════════════════════════════════════
       CHATBOT — fills the full intel-grid height
    ══════════════════════════════════════════════ */
    .chat-panel {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;           /* grow to fill remaining height */
      min-height: 0;     /* allow shrink inside flex parent */
    }

    .chat-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(16,217,126,0.04);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg,#10d97e,#059669);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #fff; flex-shrink: 0;
    }
    .chat-head-info h4 {
      font-size: 14px; font-weight: 600;
      font-family: var(--font-display);
      margin: 0;
    }
    .chat-head-info p {
      font-size: 11px; color: var(--risk-low);
      display: flex; align-items: center; gap: 5px;
      margin: 2px 0 0 0;
    }
    .chat-head-info p::before {
      content: ''; width: 6px; height: 6px;
      background: var(--risk-low); border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    /* ── Messages area ── */
    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.07) transparent;
      min-height: 0;
    }
    .chat-msgs::-webkit-scrollbar { width: 3px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,.07); border-radius: 2px; }

    /* ── Individual message row ── */
    .msg {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
      width: 100%;
    }
    .msg.user {
      flex-direction: row-reverse;
    }

    .msg-av {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.bot  .msg-av { background: linear-gradient(135deg,#10d97e,#059669); color: #fff; }
    .msg.user .msg-av { background: rgba(61,127,255,.2); color: var(--accent-light); }

    /* ── Bubble ── */
    .msg-bub {
      display: block;
      max-width: 80%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg.bot  .msg-bub {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-top-left-radius: 3px;
    }
    .msg.user .msg-bub {
      background: rgba(61,127,255,.14);
      border: 1px solid rgba(61,127,255,.22);
      color: #dbeafe;
      border-top-right-radius: 3px;
    }
    .msg-bub strong { color: var(--accent-light); }

    /* ── Bullet list inside bubble ── */
    .msg-bub ul {
      margin: 6px 0 0 0;
      padding-left: 16px;
      list-style: disc;
    }
    .msg-bub ul li {
      margin-bottom: 4px;
      font-size: 13px;
      line-height: 1.55;
    }

    /* ── Typing indicator ── */
    .typing-ind { display: flex; align-items: center; gap: 4px; padding: 8px 12px; }
    .t-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-secondary);
      animation: tdot 1.2s infinite ease-in-out;
    }
    .t-dot:nth-child(2) { animation-delay: .2s; }
    .t-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot {
      0%,80%,100% { transform: scale(.7); opacity: .4; }
      40%          { transform: scale(1);  opacity: 1;  }
    }

    /* ── Suggestion chips ── */
    .chat-suggest {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 0 14px 10px;
      flex-shrink: 0;
    }
    .sug-btn {
      padding: 4px 11px; border-radius: 16px;
      border: 1px solid rgba(16,217,126,.2);
      background: rgba(16,217,126,.06); color: #6ee7b7;
      font-size: 11px; cursor: pointer; transition: all .18s;
    }
    .sug-btn:hover { background: rgba(16,217,126,.16); border-color: var(--risk-low); }

    /* ── Input row ── */
    .chat-foot {
      padding: 11px 14px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
      flex-shrink: 0;
    }
    .chat-inp {
      flex: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 9px 12px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      outline: none; resize: none; height: 40px;
      transition: border-color .18s;
    }
    .chat-inp:focus { border-color: var(--risk-low); }
    .chat-inp::placeholder { color: var(--text-secondary); }

    .btn-send {
      width: 40px; height: 40px; border-radius: 10px;
      border: none;
      background: linear-gradient(135deg,#10d97e,#059669);
      color: #fff; font-size: 14px; cursor: pointer;
      transition: opacity .18s; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-send:hover    { opacity: .85; }
    .btn-send:disabled { opacity: .35; cursor: not-allowed; }

    .err-msg { color: #ef4444; font-size: 13px; padding: 8px 0; }
    .err-msg i { margin-right: 6px; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-shield-alt"></i>
      <span>VendorRisk</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item"><i class="fas fa-upload"></i><span>Upload</span></a>
      <a href="/results" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a href="/vendors" class="nav-item"><i class="fas fa-users"></i><span>Vendors</span></a>
      <a href="/intelligence" class="nav-item active"><i class="fas fa-brain"></i><span>AI Intelligence</span></a>
    </nav>
    <div class="sidebar-footer"><span>SAP VRM v2.0</span></div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">AI Intelligence</h1>
        <p class="page-subtitle">Vendor risk chatbot — ask anything about your portfolio</p>
      </div>
      <div class="header-badge"><i class="fas fa-brain"></i> AI Powered</div>
    </header>

    <!-- Single full-height chatbot card -->
    <div class="intel-grid">

      <!-- VendorRisk Chatbot -->
      <div class="chat-panel">
        <div class="chat-head">
          <div class="chat-avatar"><i class="fas fa-robot"></i></div>
          <div class="chat-head-info">
            <h4>VendorRisk Assistant</h4>
            <p>Online &amp; ready</p>
          </div>
        </div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-suggest" id="chatSuggest"></div>
        <div class="chat-foot">
          <textarea class="chat-inp" id="chatInp" placeholder="Ask about vendor risk…" rows="1"></textarea>
          <button class="btn-send" id="sendBtn" onclick="sendChat()" title="Send">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>
  </main>

  <script>const RAW_DATA = {{ data | safe }};</script>
  <script src="{{ url_for('static', filename='js/intelligence.js') }}"></script>
</body>
</html>
